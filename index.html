<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore®</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'DM Sans', sans-serif;
      cursor: none;
    }

    .cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: #f5f0e8;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s;
      mix-blend-mode: difference;
    }
    .cursor.hover { width: 40px; height: 40px; }

    /* OUTER BLUR — behind frame */
    .outer-video {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
    }
    .outer-video video {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scale(1.12);
      transition: opacity 1.2s ease;
    }
    .outer-video .vid-jungle { opacity: 1; filter: blur(22px) brightness(0.3) saturate(0.5); }
    .outer-video .vid-space  { opacity: 0; filter: blur(22px) brightness(0.25) saturate(0.4); }
    body.space .outer-video .vid-jungle { opacity: 0; }
    body.space .outer-video .vid-space  { opacity: 1; }

    /* FRAME */
    .frame {
      position: fixed;
      inset: 5vh 5vw;
      z-index: 10;
      border-radius: 20px;
      overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.14);
      box-shadow: 0 0 100px rgba(0,0,0,0.7);
    }

    /* INNER VIDEOS — stacked, crossfade */
    .inner-video {
      position: absolute; inset: 0;
    }
    .inner-video video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transition: opacity 1.2s ease;
    }
    .vid-jungle { opacity: 1; filter: brightness(0.68) saturate(1.1); }
    .vid-space  { opacity: 0; filter: brightness(0.75) saturate(0.9); }
    body.space .vid-jungle { opacity: 0; }
    body.space .vid-space  { opacity: 1; }

    .grad-bottom {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.04) 45%, transparent 70%);
    }
    .grad-left {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to right, rgba(0,0,0,0.5) 0%, transparent 55%);
    }
    .grain {
      position: absolute; inset: 0; z-index: 2; opacity: 0.04; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* UI LAYER inside frame */
    .ui { position: absolute; inset: 0; z-index: 3; pointer-events: none; }

    /* TITLE */
    .scene-title {
      position: absolute;
      top: clamp(24px, 4vh, 52px);
      left: clamp(28px, 4vw, 60px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .scene-title h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: clamp(56px, 9.5vw, 138px);
      font-weight: 400;
      color: #f5f0e8;
      line-height: 0.88;
      letter-spacing: -0.025em;
      text-shadow: 0 4px 40px rgba(0,0,0,0.3);
    }
    .scene-title h1 sup {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.22em;
      font-weight: 300;
      vertical-align: super;
      opacity: 0.55;
    }
    .title-jungle { opacity: 1; }
    .title-space  { opacity: 0; position: absolute; top: clamp(24px,4vh,52px); left: clamp(28px,4vw,60px); }
    body.space .title-jungle { opacity: 0; }
    body.space .title-space  { opacity: 1; }

    /* TAGLINE */
    .scene-tagline {
      position: absolute;
      bottom: clamp(28px, 5vh, 60px);
      left: clamp(28px, 4vw, 60px);
      transition: opacity 0.6s ease;
    }
    .scene-tagline p {
      font-family: 'DM Serif Display', Georgia, serif;
      font-style: italic;
      font-size: clamp(22px, 3vw, 44px);
      color: #f5f0e8;
      line-height: 1.15;
      text-shadow: 0 2px 24px rgba(0,0,0,0.4);
    }
    .tagline-jungle { opacity: 1; }
    .tagline-space  { opacity: 0; position: absolute; bottom: clamp(28px,5vh,60px); left: clamp(28px,4vw,60px); }
    body.space .tagline-jungle { opacity: 0; }
    body.space .tagline-space  { opacity: 1; }

    /* BUTTONS — inside frame, top right */
    .btn-group {
      position: absolute;
      top: clamp(20px, 3.5vh, 44px);
      right: clamp(20px, 3vw, 44px);
      z-index: 60;
      pointer-events: all;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    /* pill */
    .pill {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 148px;
      padding: 10px 10px 10px 20px;
      border-radius: 999px;
      background: rgba(245,240,232,0.1);
      border: 1px solid rgba(245,240,232,0.22);
      backdrop-filter: blur(14px);
      color: #f5f0e8;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-decoration: none;
      cursor: none;
      transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
    }
    .pill:hover {
      background: rgba(245,240,232,0.2);
      border-color: rgba(245,240,232,0.5);
      box-shadow: 0 0 20px rgba(245,240,232,0.07);
    }
    .icon-circle {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: #f5f0e8;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }
    .pill:hover .icon-circle { transform: rotate(45deg); }

    /* EXPLORE MENU — full height panel, 25% width */
    .explore-menu {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 25%;
      background: rgba(6, 6, 6, 0.72);
      backdrop-filter: blur(24px);
      border-left: 1px solid rgba(255,255,255,0.1);
      z-index: 50;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 clamp(24px, 3vw, 48px);
      gap: 16px;
      transform: translateX(100%);
      transition: transform 0.5s cubic-bezier(0.77,0,0.175,1);
      pointer-events: none;
    }
    .explore-menu.open {
      transform: translateX(0);
      pointer-events: all;
    }

    .explore-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      color: rgba(245,240,232,0.35);
      cursor: none;
      transition: color 0.25s ease;
      text-decoration: none;
    }
    .explore-option:first-child { border-top: 1px solid rgba(255,255,255,0.1); }
    .explore-option:hover { color: #f5f0e8; }
    .explore-option.current { color: #f5f0e8; }

    .explore-option h2 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: clamp(28px, 3.5vw, 52px);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .explore-option .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(245,240,232,0.25);
      flex-shrink: 0;
      transition: background 0.25s;
    }
    .explore-option.current .dot { background: #f5f0e8; }
    .explore-option:hover .dot { background: rgba(245,240,232,0.7); }

    /* SOUND bars */
    .play-icon { display: flex; }
    .sound-bars { display: none; align-items: center; gap: 3px; height: 14px; }
    .sound-bars span { display: block; width: 2.5px; background: #0a0f08; border-radius: 2px; }
    .sound-bars span:nth-child(1){height:6px}
    .sound-bars span:nth-child(2){height:13px}
    .sound-bars span:nth-child(3){height:9px}
    .sound-bars span:nth-child(4){height:13px}
    .sound-bars span:nth-child(5){height:5px}
    .btn-sound.playing .play-icon { display: none; }
    .btn-sound.playing .sound-bars { display: flex; }
    .btn-sound.playing .sound-bars span { animation: barPulse 1.1s ease-in-out infinite alternate; }
    .btn-sound.playing .sound-bars span:nth-child(2){animation-delay:.2s}
    .btn-sound.playing .sound-bars span:nth-child(3){animation-delay:.4s}
    .btn-sound.playing .sound-bars span:nth-child(4){animation-delay:.1s}
    .btn-sound.playing .sound-bars span:nth-child(5){animation-delay:.3s}
    @keyframes barPulse {
      from { transform: scaleY(0.3); }
      to   { transform: scaleY(1); }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>

  <!-- BLURRED BACKGROUND (outside frame) -->
  <div class="outer-video">
    <video class="vid-jungle" autoplay muted loop playsinline><source src="./jungle.mp4" type="video/mp4"></video>
    <video class="vid-space"  autoplay muted loop playsinline><source src="./space.mp4"  type="video/mp4"></video>
  </div>

  <!-- FRAME -->
  <div class="frame">

    <!-- SHARP VIDEOS stacked -->
    <div class="inner-video">
      <video class="vid-jungle" autoplay muted loop playsinline><source src="./jungle.mp4" type="video/mp4"></video>
      <video class="vid-space"  autoplay muted loop playsinline><source src="./space.mp4"  type="video/mp4"></video>
    </div>

    <div class="grad-bottom"></div>
    <div class="grad-left"></div>
    <div class="grain"></div>

    <!-- TEXT UI -->
    <div class="ui">

      <div class="scene-title title-jungle">
        <h1>Jungle<sup>®</sup></h1>
      </div>
      <div class="scene-title title-space">
        <h1>Space<sup>®</sup></h1>
      </div>

      <div class="scene-tagline tagline-jungle">
        <p>Deeper into<br>Nature — Deeper<br>into Yourself</p>
      </div>
      <div class="scene-tagline tagline-space">
        <p>Beyond the horizon —<br>Beyond<br>Yourself</p>
      </div>

    </div>

    <!-- EXPLORE FULL HEIGHT MENU -->
    <div class="explore-menu" id="exploreMenu">
      <div class="explore-option current" id="opt-jungle" onclick="switchScene('jungle')">
        <h2>Jungle</h2><span class="dot"></span>
      </div>
      <div class="explore-option" id="opt-space" onclick="switchScene('space')">
        <h2>Space</h2><span class="dot"></span>
      </div>
    </div>

    <!-- BUTTONS inside frame -->
    <div class="btn-group">

      <div class="pill" id="exploreBtn" onclick="toggleExplore()">
        Explore
        <span class="icon-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0a0f08" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="13" height="13">
            <line x1="7" y1="17" x2="17" y2="7"/>
            <polyline points="7 7 17 7 17 17"/>
          </svg>
        </span>
      </div>

      <div class="pill btn-sound" id="soundBtn" onclick="toggleSound()">
        Sound
        <span class="icon-circle">
          <span class="play-icon">
            <svg viewBox="0 0 24 24" fill="#0a0f08" width="13" height="13"><polygon points="5,3 19,12 5,21"/></svg>
          </span>
          <span class="sound-bars">
            <span></span><span></span><span></span><span></span><span></span>
          </span>
        </span>
      </div>

    </div>

  </div>

  <audio id="audio-jungle" src="./jungle-audio.mp3" loop></audio>
  <audio id="audio-space"  src="./space-audio.mp3"  loop></audio>

  <script>
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });
    document.querySelectorAll('.pill, .explore-option').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    let currentScene = 'jungle';
    let menuOpen = false;
    let soundPlaying = false;

    function toggleExplore() {
      menuOpen = !menuOpen;
      document.getElementById('exploreMenu').classList.toggle('open', menuOpen);
    }

    document.addEventListener('click', e => {
      if (menuOpen && !e.target.closest('.explore-menu') && !e.target.closest('#exploreBtn')) {
        menuOpen = false;
        document.getElementById('exploreMenu').classList.remove('open');
      }
    });

    function switchScene(name) {
      if (name === currentScene) { toggleExplore(); return; }
      document.body.classList.toggle('space', name === 'space');
      document.getElementById('opt-' + currentScene).classList.remove('current');
      document.getElementById('opt-' + name).classList.add('current');
      if (soundPlaying) {
        document.getElementById('audio-' + currentScene).pause();
        const a = document.getElementById('audio-' + name);
        a.currentTime = 0; a.play();
      }
      currentScene = name;
      menuOpen = false;
      document.getElementById('exploreMenu').classList.remove('open');
    }

    function toggleSound() {
      const audio = document.getElementById('audio-' + currentScene);
      const btn = document.getElementById('soundBtn');
      if (audio.paused) {
        audio.play(); soundPlaying = true; btn.classList.add('playing');
      } else {
        audio.pause(); soundPlaying = false; btn.classList.remove('playing');
      }
    }
  </script>

</body>
</html>
