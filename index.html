<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jungle®</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0f08;
      font-family: 'DM Sans', sans-serif;
      cursor: none;
    }

    /* CURSOR */
    .cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: #f5f0e8;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s;
      mix-blend-mode: difference;
    }
    .cursor.hover { width: 40px; height: 40px; }

    /* BLURRED OUTER VIDEO */
    .outer-video {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
    }
    .outer-video video {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: blur(22px) brightness(0.3) saturate(0.5);
      transform: scale(1.12);
    }

    /* FRAME */
    .frame {
      position: fixed;
      inset: 5vh 5vw;
      z-index: 10;
      border-radius: 20px;
      overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.14);
      box-shadow: 0 0 100px rgba(0,0,0,0.7);
    }

    /* SHARP VIDEO */
    .inner-video {
      position: absolute; inset: 0;
    }
    .inner-video video {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: brightness(0.68) saturate(1.1);
    }

    /* GRADIENTS */
    .grad-bottom {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to top, rgba(4,8,3,0.82) 0%, rgba(4,8,3,0.04) 45%, transparent 70%);
    }
    .grad-left {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to right, rgba(4,8,3,0.5) 0%, transparent 55%);
    }



    /* GRAIN */
    .grain {
      position: absolute; inset: 0; z-index: 3; opacity: 0.04; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    /* UI */
    .ui { position: absolute; inset: 0; z-index: 4; }

    /* Buttons above fog */
    .btn-group { isolation: isolate; }
    .btn-group { position: absolute; z-index: 20; }

    /* TOP LEFT — Title */
    .title {
      position: absolute;
      top: clamp(24px, 4vh, 52px);
      left: clamp(28px, 4vw, 60px);
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) both;
    }
    .title h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: clamp(56px, 9.5vw, 138px);
      font-weight: 400;
      color: #f5f0e8;
      line-height: 0.88;
      letter-spacing: -0.025em;
      text-shadow: 0 4px 40px rgba(0,0,0,0.25);
    }
    .title h1 sup {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.22em;
      font-weight: 300;
      vertical-align: super;
      opacity: 0.55;
    }

    /* TOP RIGHT — button group */
    .btn-group {
      position: absolute;
      top: clamp(24px, 4vh, 52px);
      right: clamp(28px, 4vw, 60px);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      width: 148px;
      animation: fadeDown 1.2s cubic-bezier(0.16,1,0.3,1) 0.15s both;
    }

    /* shared pill style */
    .pill {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      gap: 10px;
      padding: 10px 10px 10px 20px;
      border-radius: 999px;
      background: rgba(245,240,232,0.1);
      border: 1px solid rgba(245,240,232,0.22);
      backdrop-filter: blur(14px);
      color: #f5f0e8;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-decoration: none;
      cursor: none;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }
    .pill:hover {
      background: rgba(245,240,232,0.22);
      border-color: rgba(245,240,232,0.55);
      box-shadow: 0 0 20px rgba(245,240,232,0.08);
    }

    /* icon circle */
    .icon-circle {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: #f5f0e8;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
    }
    .pill:hover .icon-circle { transform: rotate(45deg); }
    .icon-circle svg { width: 13px; height: 13px; }

    /* sound-specific: play icon → bars after click */
    .play-icon { display: flex; }
    .sound-bars {
      display: none;
      align-items: center;
      gap: 3px;
      height: 14px;
    }
    .sound-bars span {
      display: block;
      width: 2.5px;
      background: #0a0f08;
      border-radius: 2px;
    }
    .sound-bars span:nth-child(1) { height: 6px; }
    .sound-bars span:nth-child(2) { height: 13px; }
    .sound-bars span:nth-child(3) { height: 9px; }
    .sound-bars span:nth-child(4) { height: 13px; }
    .sound-bars span:nth-child(5) { height: 5px; }

    /* when playing */
    .btn-sound.playing .play-icon { display: none; }
    .btn-sound.playing .sound-bars { display: flex; }
    .btn-sound.playing .sound-bars span {
      animation: barPulse 1.1s ease-in-out infinite alternate;
    }
    .btn-sound.playing .sound-bars span:nth-child(1) { animation-delay: 0s; }
    .btn-sound.playing .sound-bars span:nth-child(2) { animation-delay: 0.2s; }
    .btn-sound.playing .sound-bars span:nth-child(3) { animation-delay: 0.4s; }
    .btn-sound.playing .sound-bars span:nth-child(4) { animation-delay: 0.1s; }
    .btn-sound.playing .sound-bars span:nth-child(5) { animation-delay: 0.3s; }

    @keyframes barPulse {
      from { transform: scaleY(0.3); }
      to   { transform: scaleY(1); }
    }

    /* BOTTOM LEFT — tagline */
    .tagline {
      position: absolute;
      bottom: clamp(28px, 5vh, 60px);
      left: clamp(28px, 4vw, 60px);
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.25s both;
    }
    .tagline p {
      font-family: 'DM Serif Display', Georgia, serif;
      font-style: italic;
      font-size: clamp(22px, 3vw, 44px);
      color: #f5f0e8;
      line-height: 1.15;
      text-shadow: 0 2px 24px rgba(0,0,0,0.4);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>

  <div class="outer-video">
    <video autoplay muted loop playsinline>
      <source src="./jungle.mp4" type="video/mp4">
    </video>
  </div>

  <div class="frame">
    <div class="inner-video">
      <video autoplay muted loop playsinline>
        <source src="./jungle.mp4" type="video/mp4">
      </video>
    </div>

    <div class="grad-bottom"></div>
    <div class="grad-left"></div>

    <div class="fog">
      <div class="fog-layer"></div>
      <div class="fog-layer"></div>
      <div class="fog-layer"></div>
      <div class="fog-layer"></div>
    </div>

    <div class="grain"></div>

    <div class="ui">

      <!-- TOP LEFT -->
      <div class="title">
        <h1>Jungle<sup>®</sup></h1>
      </div>

      <!-- BOTTOM LEFT -->
      <div class="tagline">
        <p>Deeper into<br>Nature — Deeper<br>into Yourself</p>
      </div>

    </div>

    <!-- BUTTONS above fog -->
    <div class="btn-group" style="position:absolute;top:clamp(24px,4vh,52px);right:clamp(28px,4vw,60px);z-index:20;width:148px;display:flex;flex-direction:column;gap:10px;">
      <a href="#" class="pill btn-explore">
        Explore
        <span class="icon-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0a0f08" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"/>
            <polyline points="7 7 17 7 17 17"/>
          </svg>
        </span>
      </a>

      <div class="pill btn-sound" id="soundBtn" onclick="toggleSound()">
        Sound
        <span class="icon-circle">
          <span class="play-icon">
            <svg viewBox="0 0 24 24" fill="#0a0f08" width="13" height="13">
              <polygon points="5,3 19,12 5,21"/>
            </svg>
          </span>
          <span class="sound-bars">
            <span></span><span></span><span></span><span></span><span></span>
          </span>
        </span>
      </div>
    </div>
  </div>

  <audio id="ambient" src="./jungle-audio.wav" loop></audio>

  <script>
    // cursor
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });
    document.querySelectorAll('.pill').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    // sound
    const audio = document.getElementById('ambient');
    const btn   = document.getElementById('soundBtn');

    function toggleSound() {
      if (audio.paused) {
        audio.play();
        btn.classList.add('playing');
      } else {
        audio.pause();
        btn.classList.remove('playing');
      }
    }
  </script>

</body>
</html>
