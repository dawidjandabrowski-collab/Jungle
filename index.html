<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore®</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'DM Sans', sans-serif;
      cursor: none;
    }

    .cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: #f5f0e8;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s;
      mix-blend-mode: difference;
    }
    .cursor.hover { width: 40px; height: 40px; }

    /* OUTER BLUR */
    .outer-video {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
    }
    .outer-video video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scale(1.12);
      opacity: 0;
      filter: blur(22px) brightness(0.28) saturate(0.5);
      transition: opacity 1.2s ease;
    }
    .outer-video video.active { opacity: 1; }

    /* FRAME */
    .frame {
      position: fixed;
      inset: 5vh 5vw;
      z-index: 10;
      border-radius: 20px;
      overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.14);
      box-shadow: 0 0 100px rgba(0,0,0,0.7);
    }

    /* INNER VIDEOS */
    .inner-video {
      position: absolute; inset: 0;
    }
    .inner-video video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .inner-video video.active { opacity: 1; }

    .grad-bottom {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.04) 45%, transparent 70%);
    }
    .grad-left {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to right, rgba(0,0,0,0.5) 0%, transparent 55%);
    }
    .grain {
      position: absolute; inset: 0; z-index: 2; opacity: 0.04; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* UI */
    .ui { position: absolute; inset: 0; z-index: 3; pointer-events: none; }

    .scene-title {
      position: absolute;
      top: clamp(24px, 4vh, 52px);
      left: clamp(28px, 4vw, 60px);
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .scene-title.active { opacity: 1; }
    .scene-title h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: clamp(56px, 9.5vw, 138px);
      font-weight: 400;
      color: #f5f0e8;
      line-height: 0.88;
      letter-spacing: -0.025em;
      text-shadow: 0 4px 40px rgba(0,0,0,0.3);
    }
    .scene-title h1 sup {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.22em;
      font-weight: 300;
      vertical-align: super;
      opacity: 0.55;
    }

    .scene-tagline {
      position: absolute;
      bottom: clamp(28px, 5vh, 60px);
      left: clamp(28px, 4vw, 60px);
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .scene-tagline.active { opacity: 1; }
    .scene-tagline p {
      font-family: 'DM Serif Display', Georgia, serif;
      font-style: italic;
      font-size: clamp(22px, 3vw, 44px);
      color: #f5f0e8;
      line-height: 1.15;
      text-shadow: 0 2px 24px rgba(0,0,0,0.4);
    }

    /* BUTTONS */
    .btn-group {
      position: absolute;
      top: clamp(20px, 3.5vh, 44px);
      right: clamp(20px, 3vw, 44px);
      z-index: 60;
      pointer-events: all;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .pill {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 148px;
      padding: 10px 10px 10px 20px;
      border-radius: 999px;
      background: rgba(245,240,232,0.1);
      border: 1px solid rgba(245,240,232,0.22);
      backdrop-filter: blur(14px);
      color: #f5f0e8;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
      cursor: none;
      transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
    }
    .pill:hover {
      background: rgba(245,240,232,0.2);
      border-color: rgba(245,240,232,0.5);
      box-shadow: 0 0 20px rgba(245,240,232,0.07);
    }
    .icon-circle {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: #f5f0e8;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }
    .pill:hover .icon-circle { transform: rotate(45deg); }

    /* EXPLORE PANEL */
    .explore-menu {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 33.33%;
      background: rgba(6,6,6,0.72);
      backdrop-filter: blur(24px);
      border-left: 1px solid rgba(255,255,255,0.1);
      z-index: 50;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 clamp(24px, 3vw, 48px);
      transform: translateX(100%);
      transition: transform 0.5s cubic-bezier(0.77,0,0.175,1);
      pointer-events: none;
    }
    .explore-menu.open {
      transform: translateX(0);
      pointer-events: all;
    }

    .explore-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 18px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      color: rgba(245,240,232,0.35);
      cursor: none;
      transition: color 0.25s ease;
    }
    .explore-option:first-child { border-top: 1px solid rgba(255,255,255,0.1); }
    .explore-option:hover { color: #f5f0e8; }
    .explore-option.current { color: #f5f0e8; }
    .explore-option h2 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: clamp(24px, 3vw, 46px);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .option-thumb {
      width: clamp(48px, 5vw, 72px);
      height: clamp(36px, 3.5vw, 54px);
      object-fit: contain;
      opacity: 0.35;
      transition: opacity 0.25s ease;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
      flex-shrink: 0;
    }
    .explore-option:hover .option-thumb,
    .explore-option.current .option-thumb { opacity: 1; }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(245,240,232,0.2);
      flex-shrink: 0;
      transition: background 0.25s;
    }
    .explore-option.current .dot { background: #f5f0e8; }
    .explore-option:hover .dot { background: rgba(245,240,232,0.6); }

    /* SNEAKER — centered in frame */
    .sneaker {
      position: absolute;
      top: 50%;
      left: 33.33%;
      transform: translate(-50%, -50%);
      width: clamp(380px, 58vw, 820px);
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
      filter: drop-shadow(0 20px 60px rgba(0,0,0,0.6));
      z-index: 1;
    }
    .sneaker.active { opacity: 1; pointer-events: all; }

    /* MAGNIFIER LENS */
    .magnifier {
      position: fixed;
      width: 160px; height: 160px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.3), 0 8px 32px rgba(0,0,0,0.5);
      pointer-events: none;
      z-index: 9998;
      overflow: hidden;
      display: none;
      transform: translate(-50%, -50%);
    }
    .magnifier img {
      position: absolute;
      pointer-events: none;
    }
    .play-icon { display: flex; }
    .sound-bars { display: none; align-items: center; gap: 3px; height: 14px; }
    .sound-bars span { display: block; width: 2.5px; background: #0a0f08; border-radius: 2px; }
    .sound-bars span:nth-child(1){height:6px}
    .sound-bars span:nth-child(2){height:13px}
    .sound-bars span:nth-child(3){height:9px}
    .sound-bars span:nth-child(4){height:13px}
    .sound-bars span:nth-child(5){height:5px}
    .btn-sound.playing .play-icon { display: none; }
    .btn-sound.playing .sound-bars { display: flex; }
    .btn-sound.playing .sound-bars span { animation: barPulse 1.1s ease-in-out infinite alternate; }
    .btn-sound.playing .sound-bars span:nth-child(2){animation-delay:.2s}
    .btn-sound.playing .sound-bars span:nth-child(3){animation-delay:.4s}
    .btn-sound.playing .sound-bars span:nth-child(4){animation-delay:.1s}
    .btn-sound.playing .sound-bars span:nth-child(5){animation-delay:.3s}
    @keyframes barPulse {
      from { transform: scaleY(0.3); }
      to   { transform: scaleY(1); }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="magnifier" id="magnifier"><img id="magnifier-img" src="./jungle.png" alt=""></div>

  <div class="outer-video">
    <video id="out-jungle"    class="active" autoplay muted loop playsinline><source src="./jungle.mp4"    type="video/mp4"></video>
    <video id="out-space"     autoplay muted loop playsinline><source src="./space.mp4"     type="video/mp4"></video>
    <video id="out-freedom"   autoplay muted loop playsinline><source src="./freedom.mp4"   type="video/mp4"></video>
    <video id="out-forest"    autoplay muted loop playsinline><source src="./forest.mp4"    type="video/mp4"></video>
    <video id="out-waterfall" autoplay muted loop playsinline><source src="./waterfall.mp4" type="video/mp4"></video>
  </div>

  <div class="frame">

    <div class="inner-video">
      <video id="in-jungle"    class="active" autoplay muted loop playsinline><source src="./jungle.mp4"    type="video/mp4"></video>
      <video id="in-space"     autoplay muted loop playsinline><source src="./space.mp4"     type="video/mp4"></video>
      <video id="in-freedom"   autoplay muted loop playsinline><source src="./freedom.mp4"   type="video/mp4"></video>
      <video id="in-forest"    autoplay muted loop playsinline><source src="./forest.mp4"    type="video/mp4"></video>
      <video id="in-waterfall" autoplay muted loop playsinline><source src="./waterfall.mp4" type="video/mp4"></video>
    </div>

    <div class="grad-bottom"></div>
    <div class="grad-left"></div>
    <div class="grain"></div>

    <div class="ui">
      <div class="scene-title active" id="title-jungle">   <h1>Jungle<sup>®</sup></h1></div>
      <div class="scene-title"        id="title-space">    <h1>Space<sup>®</sup></h1></div>
      <div class="scene-title"        id="title-freedom">  <h1>Freedom<sup>®</sup></h1></div>
      <div class="scene-title"        id="title-forest">   <h1>Forest<sup>®</sup></h1></div>
      <div class="scene-title"        id="title-waterfall"><h1>Waterfall<sup>®</sup></h1></div>

      <div class="scene-tagline active" id="tag-jungle">   <p>Deeper into Nature —<br>Deeper into Yourself</p></div>
      <div class="scene-tagline"        id="tag-space">    <p>Beyond the horizon —<br>Beyond Yourself</p></div>
      <div class="scene-tagline"        id="tag-freedom">  <p>No boundaries —<br>Only Horizon</p></div>
      <div class="scene-tagline"        id="tag-forest">   <p>Where the trees breathe —<br>and so do you</p></div>
      <div class="scene-tagline"        id="tag-waterfall"><p>Let it flow —<br>Let it go</p></div>

      <img class="sneaker active" id="shoe-jungle"    src="./jungle.png"    alt="Jungle sneaker">
      <img class="sneaker"        id="shoe-space"     src="./space.png"     alt="Space sneaker">
      <img class="sneaker"        id="shoe-freedom"   src="./freedom.png"   alt="Freedom sneaker">
      <img class="sneaker"        id="shoe-forest"    src="./forest.png"    alt="Forest sneaker">
      <img class="sneaker"        id="shoe-waterfall" src="./waterfall.png" alt="Waterfall sneaker">
    </div>

    <div class="explore-menu" id="exploreMenu">
      <div class="explore-option current" id="opt-jungle"    onclick="switchScene('jungle')"   >
        <h2>Jungle</h2><img class="option-thumb" src="./jungle.png"    alt=""><span class="dot"></span>
      </div>
      <div class="explore-option"         id="opt-space"     onclick="switchScene('space')"    >
        <h2>Space</h2><img class="option-thumb" src="./space.png"     alt=""><span class="dot"></span>
      </div>
      <div class="explore-option"         id="opt-freedom"   onclick="switchScene('freedom')"  >
        <h2>Freedom</h2><img class="option-thumb" src="./freedom.png"   alt=""><span class="dot"></span>
      </div>
      <div class="explore-option"         id="opt-forest"    onclick="switchScene('forest')"   >
        <h2>Forest</h2><img class="option-thumb" src="./forest.png"    alt=""><span class="dot"></span>
      </div>
      <div class="explore-option"         id="opt-waterfall" onclick="switchScene('waterfall')">
        <h2>Waterfall</h2><img class="option-thumb" src="./waterfall.png" alt=""><span class="dot"></span>
      </div>
    </div>

    <div class="btn-group">
      <div class="pill" id="exploreBtn" onclick="toggleExplore()">
        Explore
        <span class="icon-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0a0f08" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="13" height="13">
            <line x1="7" y1="17" x2="17" y2="7"/>
            <polyline points="7 7 17 7 17 17"/>
          </svg>
        </span>
      </div>
      <div class="pill btn-sound" id="soundBtn" onclick="toggleSound()">
        Sound
        <span class="icon-circle">
          <span class="play-icon">
            <svg viewBox="0 0 24 24" fill="#0a0f08" width="13" height="13"><polygon points="5,3 19,12 5,21"/></svg>
          </span>
          <span class="sound-bars">
            <span></span><span></span><span></span><span></span><span></span>
          </span>
        </span>
      </div>
    </div>

  </div>

  <!-- All audio preloaded, same format 44100Hz 128kbps -->
  <audio id="audio-jungle"    src="./jungle-audio.mp3"    preload="auto" loop></audio>
  <audio id="audio-space"     src="./space-audio.mp3"     preload="auto" loop></audio>
  <audio id="audio-freedom"   src="./freedom-audio.mp3"   preload="auto" loop></audio>
  <audio id="audio-forest"    src="./forest-audio.mp3"    preload="auto" loop></audio>
  <audio id="audio-waterfall" src="./waterfall-audio.mp3" preload="auto" loop></audio>

  <script>
    // cursor
    const cursor = document.getElementById('cursor');
    const magnifier = document.getElementById('magnifier');
    const magnifierImg = document.getElementById('magnifier-img');
    const ZOOM = 1.8;
    const LENS = 160;

    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });

    // sneaker hover — magnifier
    document.querySelectorAll('.sneaker').forEach(shoe => {
      shoe.addEventListener('mouseenter', () => {
        cursor.style.display = 'none';
        magnifier.style.display = 'block';
        magnifierImg.src = shoe.src;  // use THIS shoe's src
      });
      shoe.addEventListener('mouseleave', () => {
        cursor.style.display = 'block';
        magnifier.style.display = 'none';
      });
      shoe.addEventListener('mousemove', e => {
        magnifier.style.left = e.clientX + 'px';
        magnifier.style.top  = e.clientY + 'px';

        const rect = shoe.getBoundingClientRect();
        const relX = e.clientX - rect.left;
        const relY = e.clientY - rect.top;

        const bgW = rect.width  * ZOOM;
        const bgH = rect.height * ZOOM;
        const bgX = relX * ZOOM - LENS / 2;
        const bgY = relY * ZOOM - LENS / 2;

        magnifierImg.style.width  = bgW + 'px';
        magnifierImg.style.height = bgH + 'px';
        magnifierImg.style.left   = -bgX + 'px';
        magnifierImg.style.top    = -bgY + 'px';
      });
    });

    document.querySelectorAll('.pill, .explore-option').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    let current = 'jungle';
    let menuOpen = false;
    let soundPlaying = false;

    function switchScene(name) {
      if (name === current) { closeMenu(); return; }

      // swap videos
      ['out-','in-'].forEach(prefix => {
        document.getElementById(prefix + current).classList.remove('active');
        document.getElementById(prefix + name).classList.add('active');
      });

      // swap text + sneaker
      ['title-','tag-','shoe-'].forEach(prefix => {
        document.getElementById(prefix + current).classList.remove('active');
        document.getElementById(prefix + name).classList.add('active');
      });

      // swap menu dot
      document.getElementById('opt-' + current).classList.remove('current');
      document.getElementById('opt-' + name).classList.add('current');

      // swap audio — stop old, start new if playing
      if (soundPlaying) {
        const oldAudio = document.getElementById('audio-' + current);
        oldAudio.pause();
        oldAudio.currentTime = 0;

        const newAudio = document.getElementById('audio-' + name);
        newAudio.currentTime = 0;
        const playPromise = newAudio.play();
        if (playPromise !== undefined) {
          playPromise.catch(err => {
            console.warn('Audio play failed:', err);
            soundPlaying = false;
            document.getElementById('soundBtn').classList.remove('playing');
          });
        }
      }

      current = name;
      magnifierImg.src = `./${name}.png`;
      closeMenu();
    }

    function toggleExplore() {
      menuOpen = !menuOpen;
      document.getElementById('exploreMenu').classList.toggle('open', menuOpen);
    }

    function closeMenu() {
      menuOpen = false;
      document.getElementById('exploreMenu').classList.remove('open');
    }

    document.addEventListener('click', e => {
      if (menuOpen && !e.target.closest('.explore-menu') && !e.target.closest('#exploreBtn')) {
        closeMenu();
      }
    });

    function toggleSound() {
      const audio = document.getElementById('audio-' + current);
      const btn = document.getElementById('soundBtn');

      if (audio.paused) {
        audio.currentTime = 0;
        const playPromise = audio.play();
        if (playPromise !== undefined) {
          playPromise.then(() => {
            soundPlaying = true;
            btn.classList.add('playing');
          }).catch(err => {
            console.warn('Audio play failed:', err);
          });
        }
      } else {
        audio.pause();
        soundPlaying = false;
        btn.classList.remove('playing');
      }
    }
  </script>

</body>
</html>
